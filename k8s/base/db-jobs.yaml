apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: microservice-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/part-of: microservice-app
    spec:
      restartPolicy: OnFailure
      serviceAccountName: db-jobs
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/your-org/microservice-app-db-tools:replace-me
          args: ["migrate:up"]
          env:
            - name: HOME
              value: /tmp
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: microservice-app-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
