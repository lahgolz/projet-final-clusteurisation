apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: microshop
  annotations:
    # GitOps tools can use this ordering hint; kubectl users run this job before the apps.
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/part-of: microshop
    spec:
      restartPolicy: OnFailure
      serviceAccountName: microshop
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/your-org/microshop-db-tools:replace-me
          args: ["migrate:up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: microshop-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed
  namespace: microshop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-seed
        app.kubernetes.io/part-of: microshop
    spec:
      restartPolicy: OnFailure
      serviceAccountName: microshop
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: ghcr.io/your-org/microshop-db-tools:replace-me
          args: ["seed"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: microshop-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
