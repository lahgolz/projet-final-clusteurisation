apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: microshop
spec:
  selector:
    app.kubernetes.io/name: catalogue
  ports:
    - name: http
      port: 4001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: microshop
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalogue
        app.kubernetes.io/part-of: microshop
    spec:
      serviceAccountName: microshop
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: catalogue
                topologyKey: kubernetes.io/hostname
      containers:
        - name: catalogue
          image: ghcr.io/your-org/microshop-catalogue:replace-me
          ports:
            - name: http
              containerPort: 4001
          envFrom:
            - configMapRef:
                name: microshop-config
          env:
            - name: PORT
              value: "4001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: microshop-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
