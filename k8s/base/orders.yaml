apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: microservice-app
  labels:
    app.kubernetes.io/name: orders
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: microservice-app
    app.kubernetes.io/version: "0.1.0"
spec:
  selector:
    app.kubernetes.io/name: orders
  ports:
    - name: http
      port: 4002
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: microservice-app
  labels:
    app.kubernetes.io/name: orders
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: microservice-app
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orders
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: microservice-app
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: orders
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: orders
                topologyKey: kubernetes.io/hostname
      containers:
        - name: orders
          image: ghcr.io/lahgolz/microservice-app-orders:replace-me
          ports:
            - name: http
              containerPort: 4002
          envFrom:
            - configMapRef:
                name: microservice-app-config
          env:
            - name: PORT
              value: "4002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: microservice-app-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
