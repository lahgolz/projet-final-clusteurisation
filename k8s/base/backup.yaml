apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-backup-scripts
  namespace: microservice-app
data:
  backup.sh: |
    #!/bin/sh
    set -eu

    BACKUP_DIR=/backups
    RETENTION="${RETENTION_COUNT:-7}"
    TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
    TMP_FILE="${BACKUP_DIR}/.tmp-${TIMESTAMP}.sql"
    FILE="${BACKUP_DIR}/${POSTGRES_DB}-${TIMESTAMP}.sql.gz"

    echo "==> Dump de ${POSTGRES_DB} (pg_dump --clean --if-exists)"
    pg_dump --clean --if-exists --no-owner --dbname="${DATABASE_URL}" > "${TMP_FILE}"

    echo "==> Compression"
    gzip -9 "${TMP_FILE}"
    mv "${TMP_FILE}.gz" "${FILE}"
    echo "==> Backup écrit : ${FILE} ($(du -h "${FILE}" | cut -f1))"

    echo "==> Rétention : conservation des ${RETENTION} sauvegardes les plus récentes"
    COUNT=$(ls -1 "${BACKUP_DIR}"/*.sql.gz 2>/dev/null | wc -l)
    if [ "${COUNT}" -gt "${RETENTION}" ]; then
      ls -1t "${BACKUP_DIR}"/*.sql.gz | tail -n "+$((RETENTION + 1))" | while read -r old; do
        echo "    suppression (rétention dépassée) : ${old}"
        rm -f "${old}"
      done
    fi

    echo "==> Sauvegardes présentes après rétention :"
    ls -lh "${BACKUP_DIR}"/*.sql.gz
  restore.sh: |
    #!/bin/sh
    set -eu

    BACKUP_DIR=/backups
    NAME="${RESTORE_FILE:-latest}"

    if [ "${NAME}" = "latest" ]; then
      FILE=$(ls -1t "${BACKUP_DIR}"/*.sql.gz 2>/dev/null | head -1)
    else
      FILE="${BACKUP_DIR}/${NAME}"
    fi

    if [ -z "${FILE}" ] || [ ! -f "${FILE}" ]; then
      echo "ERREUR : fichier de sauvegarde introuvable (${NAME})" >&2
      echo "Sauvegardes disponibles :" >&2
      ls -lh "${BACKUP_DIR}" >&2 || true
      exit 1
    fi

    echo "==> Restauration depuis ${FILE}"
    gunzip -c "${FILE}" | psql -v ON_ERROR_STOP=1 "${DATABASE_URL}"
    echo "==> Restauration terminée."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup
  namespace: microservice-app
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: microservice-app
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/part-of: microservice-app
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
            app.kubernetes.io/part-of: microservice-app
        spec:
          restartPolicy: Never
          serviceAccountName: db-backup
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:16.6-alpine3.21
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: RETENTION_COUNT
                  value: "7"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: microservice-app-db
                      key: POSTGRES_DB
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: microservice-app-db
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backups
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: postgres-backup-scripts
                defaultMode: 0555
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backup
            - name: tmp
              emptyDir: {}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-restore
  namespace: microservice-app
  labels:
    app.kubernetes.io/name: postgres-restore
    app.kubernetes.io/part-of: microservice-app
spec:
  # Jamais exécuté automatiquement (suspend: true) : une restauration écrase les données
  # courantes. Déclenchement volontaire uniquement, voir docs/backup-restore.md :
  #   kubectl -n microservice-app create job --from=cronjob/postgres-restore restore-manual-<ts>
  schedule: "0 3 * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-restore
            app.kubernetes.io/part-of: microservice-app
        spec:
          restartPolicy: Never
          serviceAccountName: db-backup
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: restore
              image: postgres:16.6-alpine3.21
              command: ["/bin/sh", "/scripts/restore.sh"]
              env:
                - name: RESTORE_FILE
                  value: "latest"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: microservice-app-db
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backups
                  mountPath: /backups
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: postgres-backup-scripts
                defaultMode: 0555
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backup
            - name: tmp
              emptyDir: {}
