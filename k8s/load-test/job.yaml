apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: microservice-app
  labels:
    app.kubernetes.io/name: k6-load-test
    app.kubernetes.io/part-of: microservice-app
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6-load-test
        app.kubernetes.io/part-of: microservice-app
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 12345
        runAsGroup: 12345
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: grafana/k6:0.55.0
          args: ["run", "/scripts/catalogue-orders-load.js"]
          env:
            - name: CATALOGUE_URL
              value: http://catalogue:4001
            - name: ORDERS_URL
              value: http://orders:4002
            - name: PEAK_VUS
              value: "80"
            - name: RAMP_UP
              value: "30s"
            - name: PLATEAU
              value: "120s"
            - name: RAMP_DOWN
              value: "30s"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: k6-load-test-script
        - name: tmp
          emptyDir: {}
