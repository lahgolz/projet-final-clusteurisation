name: CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  ci:
    name: CI (lint, typecheck, tests, build)
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build, scan & push (${{ matrix.component }})
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: catalogue
            dockerfile: services/catalogue/Dockerfile
          - component: orders
            dockerfile: services/orders/Dockerfile
          - component: frontend
            dockerfile: apps/frontend/Dockerfile
          - component: db-tools
            dockerfile: packages/db/Dockerfile
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Déterminer le tag immuable (SHA Git)
        id: tags
        run: echo "sha_tag=sha-$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Construire l'image (chargée localement, pas encore poussée)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: >-
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/microservice-app-${{ matrix.component }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Scanner l'image (échoue sur une vulnérabilité CRITICAL non acceptée)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/microservice-app-${{ matrix.component }}:${{ steps.tags.outputs.sha_tag }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Générer le SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/microservice-app-${{ matrix.component }}:${{ steps.tags.outputs.sha_tag }}
          format: cyclonedx
          output: sbom-${{ matrix.component }}.cdx.json

      - name: Publier le SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}-${{ steps.tags.outputs.sha_tag }}
          path: sbom-${{ matrix.component }}.cdx.json
          retention-days: 90

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pousser l'image (tag SHA immuable)
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/microservice-app-${{ matrix.component }}:${{ steps.tags.outputs.sha_tag }}"

      - name: Pousser également le tag de release (uniquement sur un tag Git vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/microservice-app-${{ matrix.component }}"
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          docker tag "${IMAGE}:${{ steps.tags.outputs.sha_tag }}" "${IMAGE}:${RELEASE_TAG}"
          docker push "${IMAGE}:${RELEASE_TAG}"

  validate-manifests:
    name: Valider les manifests Kubernetes
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer kustomize
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash -s -- 5.5.0 "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Rendre l'overlay prod (secret factice, uniquement pour la validation de schéma)
        run: |
          cp k8s/overlays/prod/secret.env.example k8s/overlays/prod/secret.env
          kustomize build k8s/overlays/prod > "${RUNNER_TEMP}/rendered-prod.yaml"
          rm -f k8s/overlays/prod/secret.env

      - name: Valider le schéma Kubernetes (kubeconform)
        run: |
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.4 -strict -summary \
            < "${RUNNER_TEMP}/rendered-prod.yaml"
