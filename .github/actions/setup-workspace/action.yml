name: Setup workspace
description: >
  Installe Node.js et pnpm (version lue depuis "packageManager" dans package.json), avec cache
  du store pnpm, puis installe les dépendances du monorepo avec --frozen-lockfile.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22.23.1'
        cache: 'pnpm'

    - name: Installer les dépendances (lockfile figé)
      shell: bash
      run: pnpm install --frozen-lockfile
